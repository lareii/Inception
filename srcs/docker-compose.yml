services:
  mariadb:
    build: ./reqs/mariadb
    image: mariadb
    container_name: inception-mariadb
    restart: unless-stopped
    env_file: ./.env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception
    secrets:
      - db_root_password
      - db_password

  wordpress:
    build: ./reqs/wordpress
    image: wordpress
    container_name: inception-wordpress
    restart: unless-stopped
    env_file: ./.env
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
    depends_on:
      - mariadb
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password

  nginx:
    build: ./reqs/nginx
    image: nginx
    container_name: inception-nginx
    # restart always if not manually stopped
    restart: unless-stopped
    env_file: ./.env
    volumes:
      - wordpress_data:/var/www/wordpress
    # necessary for envsubst
    networks:
      - inception
    ports:
      - "443:443"
    depends_on:
      - wordpress

networks:
  inception:
    driver: bridge

volumes:
  wordpress_data:
    name: 'wordpress_data'
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: ${VOLUMES_PATH}/wordpress

  db_data:
    name: 'db_data'
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUMES_PATH}/mariadb

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
